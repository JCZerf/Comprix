name: market_express
description: "A new Flutter project."

publish_to: 'none' 

version: 2.2.1+4

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  provider: ^6.1.5+1
  flutter_launcher_icons: ^0.14.4
  intl: ^0.19.0
  currency_text_input_formatter: ^2.1.10

  

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets: 
    - assets/category.JSON
    - assets/img/logo.png
    - assets/img/logov2.png

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/img/logov2.png"
    background_color: "#ffffff"
    theme_color: "#111111"
  windows:
    generate: true
    image_path: "assets/img/logov2.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/img/logov2.png"
  image_path: "assets/img/logov2.png"
